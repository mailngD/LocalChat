name: 构建 Android APK

开启:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
构建:
运行于: ubuntu-latest
    
步骤:
    - 名称: 签出代码
使用: actions/checkout@v3
    
    - 名称: 设置 JDK 17
使用: actions/setup-java@v3
      with:
Java版本: '17'
发行版: 'temurin'
    
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v2
    
    - name: 构建调试APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: 上传APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
